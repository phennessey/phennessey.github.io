<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>BG Audio Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #0d1b2a;
      font-family: system-ui, sans-serif;
      color: #e8f4f8;
      padding: 24px;
      text-align: center;
    }
    button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: #e8f4f8;
      font-size: 18px;
      cursor: pointer;
    }
    button:active { background: rgba(255,255,255,0.14); }
    #status { font-size: 14px; opacity: 0.8; min-height: 1.2em; }
    p { font-size: 13px; opacity: 0.6; max-width: 320px; line-height: 1.5; }
  </style>
</head>
<body>
  <!-- Bare audio element. No AudioContext anywhere. playsinline keeps iOS
       from taking it fullscreen. loop keeps it going. -->
  <audio id="audioEl" src="ocean.mp3" loop preload="auto" playsinline></audio>

  <button id="playBtn">Play</button>
  <div id="status">idle</div>
  <p>Tap play, then lock your phone or switch apps. If the audio keeps
     playing screen-off, the bare-element approach works on this device.</p>

  <script>
    const audioEl = document.getElementById("audioEl");
    const playBtn = document.getElementById("playBtn");
    const status = document.getElementById("status");

    let playing = false;

    function setStatus(s) { status.textContent = s; }

    playBtn.addEventListener("click", async () => {
      if (!playing) {
        try {
          await audioEl.play();
          playing = true;
          playBtn.textContent = "Pause";
          setStatus("playing");
        } catch (e) {
          setStatus("play failed: " + e.message);
        }
      } else {
        audioEl.pause();
        playing = false;
        playBtn.textContent = "Play";
        setStatus("paused");
      }
    });

    // Treat this as real media so the OS shows lock-screen controls and is
    // more inclined to keep it alive when backgrounded.
    if ("mediaSession" in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({ title: "Ocean Waves (BG Test)" });
      navigator.mediaSession.setActionHandler("play", () => {
        audioEl.play();
        playing = true;
        playBtn.textContent = "Pause";
        setStatus("playing (lock screen)");
      });
      navigator.mediaSession.setActionHandler("pause", () => {
        audioEl.pause();
        playing = false;
        playBtn.textContent = "Play";
        setStatus("paused (lock screen)");
      });
    }

    // Surface what the element does on its own, so you can see in the status
    // line whether iOS paused it on lock vs it kept going.
    audioEl.addEventListener("pause", () => setStatus("element reports: paused"));
    audioEl.addEventListener("play", () => setStatus("element reports: playing"));
  </script>
</body>
</html>
