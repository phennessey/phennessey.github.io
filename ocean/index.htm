<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      font-family: system-ui, sans-serif;
      color: #e8f4f8;
    }

    .player-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .play-btn {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: #e8f4f8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .play-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .slider-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 260px;
    }

    .slider-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(232,244,248,0.45);
      padding-bottom: 2px;
    }

    input[type=range] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
      display: block;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e8f4f8;
      cursor: pointer;
    }

    input[type=range]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e8f4f8;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="player-wrap">
    <button class="play-btn" id="playBtn" aria-label="Play ocean audio">
      <svg id="btnIcon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </button>

    <div class="slider-wrap">
      <span class="slider-label">TONE</span>
      <input type="range" min="0" max="1" step="0.001" value="0" id="filterSlider" aria-label="Filter intensity" />
    </div>
  </div>

  <script>
    const AUDIO_SRC = 'ocean.mp3';

    const MIN_CUTOFF = 200;
    const MAX_CUTOFF = 20000;
    const EXPO = 2;
    const FILTER_Q = 0.1;

    let audioCtx, sourceNode, filterNode, buffer;
    let isPlaying = false;
    let isInitialized = false;
    let startTime = 0;
    let pauseOffset = 0;

    const playBtn = document.getElementById('playBtn');
    const btnIcon = document.getElementById('btnIcon');
    const filterSlider = document.getElementById('filterSlider');

    function setIcon(playing) {
      btnIcon.innerHTML = playing
        ? '<rect x="6" y="3" width="4" height="18"/><rect x="14" y="3" width="4" height="18"/>'
        : '<polygon points="5,3 19,12 5,21"/>';
      playBtn.setAttribute('aria-label', playing ? 'Pause ocean audio' : 'Play ocean audio');
    }

    async function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const res = await fetch(AUDIO_SRC);
      buffer = await audioCtx.decodeAudioData(await res.arrayBuffer());

      filterNode = audioCtx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.Q.value = FILTER_Q;

      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({ title: 'Ocean' });
      }

      isInitialized = true;
    }

    function startSource(offset) {
      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode.stop();
      }
      sourceNode = audioCtx.createBufferSource();
      sourceNode.buffer = buffer;
      sourceNode.loop = true;
      applyFilter(parseFloat(filterSlider.value));
      sourceNode.start(0, offset % buffer.duration);
      startTime = audioCtx.currentTime - (offset % buffer.duration);
    }

    function applyFilter(val) {
      if (!sourceNode) return;
      sourceNode.disconnect();

      if (val === 0) {
        sourceNode.connect(audioCtx.destination);
      } else {
        const curved = Math.pow(val, 1 / EXPO);
        const cutoff = MAX_CUTOFF * Math.pow(MIN_CUTOFF / MAX_CUTOFF, curved);
        filterNode.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.05);
        sourceNode.connect(filterNode);
        filterNode.connect(audioCtx.destination);
      }
    }

    playBtn.addEventListener('click', async () => {
      if (!isInitialized) {
        await initAudio();
        startSource(0);
        isPlaying = true;
        setIcon(true);
        return;
      }

      if (isPlaying) {
        pauseOffset = (audioCtx.currentTime - startTime) % buffer.duration;
        sourceNode.stop();
        isPlaying = false;
        setIcon(false);
      } else {
        startSource(pauseOffset);
        isPlaying = true;
        setIcon(true);
      }
    });

    filterSlider.addEventListener('input', () => {
      applyFilter(parseFloat(filterSlider.value));
    });
  </script>
</body>
</html>
