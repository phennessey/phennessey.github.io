<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Ocean Waves</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <img id="bgImg" src="img/moon_bg.jpg" alt="" />
  <audio id="hiddenAudio" playsinline></audio>
  <div class="player-wrap">
    <div class="play-btn" id="playBtn" aria-label="Play" role="button" tabindex="0">
      <img id="moonImg" class="moon-img" src="img/moon_050.png" alt="Moon" />
      <svg id="btnIcon" class="play-icon play-icon-overlay" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,3 19,12 5,21" transform="translate(1,0)"/>
      </svg>
    </div>
    <div class="slider-wrap">
      <div class="pill-track" id="pillTrack">
        <div class="pill-thumb" id="pillThumb">
          <span class="slider-label">TONE</span>
          <span class="slider-value" id="sliderValue">100</span>
        </div>
      </div>
    </div>
  </div>
  <script src="ui.js"></script>
  <script src="audio.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      initSlider();
      initAudioEngine({
        playBtn: document.getElementById("playBtn"),
        hiddenAudio: document.getElementById("hiddenAudio")
      });
    });
  </script>
</body>
</html>
