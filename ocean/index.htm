<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Ocean</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      font-family: system-ui, sans-serif;
      color: #e8f4f8;
    }

    .player-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .play-btn {
      width: 43px;
      height: 43px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: #e8f4f8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .play-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .slider-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 43px;
    }

    .slider-labels {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .pill-track {
      position: relative;
      width: 43px;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      overflow: hidden;
      cursor: pointer;
    }

    .pill-fill {
      position: absolute;
      bottom: 2px;
      left: 2px;
      right: 2px;
      border-radius: 0 0 999px 999px;
      background: rgba(255,255,255,0.18);
      pointer-events: none;
    }

    .pill-thumb {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #667887;
      cursor: pointer;
      pointer-events: none;
    }

    .slider-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(232,244,248,0.3);
      line-height: 1;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }

    .slider-value {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(232,244,248,0.6);
      line-height: 1;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>
  <audio id="audioEl" src="ocean.mp3" loop preload="auto"></audio>

  <div class="player-wrap">
    <button class="play-btn" id="playBtn" aria-label="Play ocean audio">
      <svg id="btnIcon" viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
        <polygon points="5,3 19,12 5,21" transform="translate(1,0)"/>
      </svg>
    </button>

    <div class="slider-wrap">
      <div class="pill-track" id="pillTrack">
        <div class="pill-fill" id="pillFill"></div>
        <div class="pill-thumb" id="pillThumb"></div>
      </div>
      <div class="slider-labels">
        <span class="slider-label">TONE</span>
        <span class="slider-value" id="sliderValue">100</span>
      </div>
    </div>
  </div>

  <script>
    const MIN_CUTOFF = 200;
    const MAX_CUTOFF = 20000;
    const EXPO = 2;
    const FILTER_Q = 0.1;

    const BORDER = 1.5;
    const GAP = 2;
    const PILL_W = 43;
    const INNER_W = PILL_W - (BORDER * 2); // actual content width = 40px
    const THUMB_D = INNER_W - (GAP * 2);   // thumb = 40 - 4 = 36px
    const INSET = GAP;                      // position offset from content edge

    let audioCtx, sourceNode, filterNode;
    let isPlaying = false;
    let isInitialized = false;
    let isDragging = false;
    let sliderVal = 0; // 0 = top (no filter), 1 = bottom (max filter)

    const playBtn = document.getElementById('playBtn');
    const btnIcon = document.getElementById('btnIcon');
    const audioEl = document.getElementById('audioEl');
    const pillTrack = document.getElementById('pillTrack');
    const pillFill = document.getElementById('pillFill');
    const pillThumb = document.getElementById('pillThumb');
    const sliderValue = document.getElementById('sliderValue');

    function setIcon(playing) {
      btnIcon.innerHTML = playing
        ? '<rect x="6" y="4" width="4" height="15"/><rect x="14" y="4" width="4" height="15"/>'
        : '<polygon points="5,3 19,12 5,21" transform="translate(1,0)"/>';
      playBtn.setAttribute('aria-label', playing ? 'Pause ocean audio' : 'Play ocean audio');
    }

    function updateSliderUI(val) {
      const trackH = pillTrack.clientHeight;
      const thumbR = THUMB_D / 2;
      const travel = trackH - INSET * 2 - THUMB_D;
      const thumbTop = INSET + val * travel;
      pillThumb.style.top = thumbTop + 'px';
      const thumbCenter = thumbTop + thumbR;
      const fillHeight = trackH - thumbCenter - GAP;
      pillFill.style.height = Math.max(0, fillHeight) + 'px';
      sliderValue.textContent = Math.round((1 - val) * 100);
    }

    function valFromY(clientY) {
      const rect = pillTrack.getBoundingClientRect();
      const thumbR = THUMB_D / 2;
      const travel = rect.height - INSET * 2 - THUMB_D;
      const y = clientY - rect.top - INSET - thumbR;
      return Math.max(0, Math.min(1, y / travel));
    }

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      sourceNode = audioCtx.createMediaElementSource(audioEl);
      filterNode = audioCtx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.Q.value = FILTER_Q;
      filterNode.frequency.value = MAX_CUTOFF;
      sourceNode.connect(filterNode);
      filterNode.connect(audioCtx.destination);
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({ title: 'Ocean' });
      }
      isInitialized = true;
    }

    function applyFilter(val) {
      if (!filterNode) return;
      const curved = Math.pow(val, 1 / EXPO);
      const cutoff = MAX_CUTOFF * Math.pow(MIN_CUTOFF / MAX_CUTOFF, curved);
      filterNode.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.05);
    }

    playBtn.addEventListener('click', () => {
      if (!isInitialized) initAudio();
      audioCtx.resume();
      if (isPlaying) {
        audioEl.pause();
        isPlaying = false;
        setIcon(false);
      } else {
        audioEl.play();
        isPlaying = true;
        setIcon(true);
      }
    });

    // Touch & mouse drag on pill
    function onDragStart(e) {
      isDragging = true;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      sliderVal = valFromY(clientY);
      updateSliderUI(sliderVal);
      if (isInitialized) applyFilter(sliderVal);
    }

    function onDragMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      sliderVal = valFromY(clientY);
      updateSliderUI(sliderVal);
      if (isInitialized) applyFilter(sliderVal);
    }

    function onDragEnd() { isDragging = false; }

    pillTrack.addEventListener('mousedown', onDragStart);
    pillTrack.addEventListener('touchstart', onDragStart, { passive: true });
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('touchmove', onDragMove, { passive: false });
    window.addEventListener('mouseup', onDragEnd);
    window.addEventListener('touchend', onDragEnd);

    // Init UI
    pillThumb.style.width = THUMB_D + 'px';
    pillThumb.style.height = THUMB_D + 'px';

    function resizeUI() {
      const BTN_H = 43;
      const GAP_BTN = 12;
      const GAP_LABELS = 8;
      const LABELS_H = sliderValue.offsetHeight + document.querySelector('.slider-label').offsetHeight + 2;
      const overhead = BTN_H + GAP_BTN + GAP_LABELS + LABELS_H;
      const pillH = Math.max(120, (window.innerHeight * 0.86) - overhead);
      pillTrack.style.height = pillH + 'px';
      updateSliderUI(sliderVal);
    }

    window.addEventListener('resize', resizeUI);
    resizeUI();
  </script>
</body>
</html>
