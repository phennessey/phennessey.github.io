<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Ocean Waves</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #0d1b2a; font-family: system-ui, sans-serif; color: #e8f4f8;
    }
    :root {
      --unit: 0px; --pill-w: calc(43 * var(--unit)); --pill-h: calc(160 * var(--unit));
      --btn-sz: calc(43 * var(--unit)); --gap: calc(6 * var(--unit));
      --border: calc(1.5 * var(--unit)); --inset: calc(1.5 * var(--unit));
      --thumb-d: calc(var(--pill-w) - var(--border) * 2 - var(--inset) * 2);
      --icon-sz: calc(17 * var(--unit)); --font-tone: calc(4.5 * var(--unit));
      --font-val: calc(5.5 * var(--unit));
    }
    .player-wrap { display: flex; flex-direction: column; align-items: center; gap: var(--gap); }
    .play-btn {
      width: var(--btn-sz); height: var(--btn-sz); flex-shrink: 0; border-radius: 50%;
      border: var(--border) solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.06);
      color: #e8f4f8; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, opacity 0.3s;
    }
    .play-btn:hover { background: rgba(255,255,255,0.12); }
    .slider-wrap { display: flex; flex-direction: column; align-items: center; width: var(--pill-w); }
    .pill-track {
      position: relative; width: var(--pill-w); height: var(--pill-h); border-radius: 999px;
      border: var(--border) solid rgba(255,255,255,0.25); background: transparent; overflow: hidden; cursor: pointer;
    }
    .pill-fill {
      position: absolute; bottom: var(--inset); left: var(--inset); right: var(--inset);
      border-radius: 0 0 999px 999px; background: rgba(255,255,255,0.09); pointer-events: none;
    }
    .pill-thumb {
      position: absolute; left: 50%; transform: translateX(-50%); width: var(--thumb-d); height: var(--thumb-d);
      border-radius: 50%; background: #667887; pointer-events: none;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--unit);
    }
    .slider-label { font-size: var(--font-tone); font-weight: 700; letter-spacing: 0.1em;
      color: rgba(13,27,42,0.3); line-height: 1; text-align: center; user-select: none; }
    .slider-value { font-size: var(--font-val); font-weight: 700; color: rgba(13,27,42,0.6);
      line-height: 1; text-align: center; user-select: none; }
  </style>
</head>
<body>
  <audio id="audioEl" src="ocean.mp3" loop preload="auto"></audio>

  <div class="player-wrap">
    <button class="play-btn" id="playBtn" aria-label="Play">
      <svg id="btnIcon" viewBox="0 0 24 24" fill="currentColor"
           style="width:var(--icon-sz);height:var(--icon-sz)">
        <polygon points="5,3 19,12 5,21" transform="translate(1,0)"/>
      </svg>
    </button>
    <div class="slider-wrap">
      <div class="pill-track" id="pillTrack">
        <div class="pill-fill" id="pillFill"></div>
        <div class="pill-thumb" id="pillThumb">
          <span class="slider-label">TONE</span>
          <span class="slider-value" id="sliderValue">100</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const MIN_CUTOFF = 200;
    const MAX_CUTOFF = 20000;
    const EXPO = 2;
    const FILTER_Q = 0.1;
    const FADE_MS = 200;
    const FADE_SEC = FADE_MS / 1000;
    const PRE_FADE_DELAY_MS = 500;
    const TONE_UPDATE_INTERVAL_MS = 85;     // ~12 updates per second max (safe)
    const TONE_RAMP_MS = 140;               // nice overlapping ramps

    let audioCtx, filterNode, gainNode;
    let isPlaying = false;
    let isInitialized = false;
    let sliderVal = 0;
    let lastAppliedSliderVal = -1;
    let lastToneUpdateTime = 0;
    let toneRafId = null;
    let isDragging = false;
    let dragRelative = false;
    let dragStartY = 0;
    let dragStartVal = 0;

    const audioEl = document.getElementById('audioEl');
    const playBtn = document.getElementById('playBtn');
    const btnIcon = document.getElementById('btnIcon');
    const pillTrack = document.getElementById('pillTrack');
    const pillFill = document.getElementById('pillFill');
    const pillThumb = document.getElementById('pillThumb');
    const sliderValue = document.getElementById('sliderValue');

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      filterNode = audioCtx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.Q.value = FILTER_Q;

      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0;

      audioCtx.createMediaElementSource(audioEl)
        .connect(filterNode)
        .connect(gainNode)
        .connect(audioCtx.destination);

      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({ title: 'Ocean Waves' });
      }
      isInitialized = true;
    }

    function updateToneIfNeeded() {
      if (!filterNode || !audioCtx) return;

      const nowMs = performance.now();

      // Throttle to ~12 updates/sec max — much gentler on the audio engine
      if (nowMs - lastToneUpdateTime < TONE_UPDATE_INTERVAL_MS) {
        toneRafId = requestAnimationFrame(updateToneIfNeeded);
        return;
      }

      if (sliderVal !== lastAppliedSliderVal) {
        const curved = Math.pow(sliderVal, 1 / EXPO);
        const targetFreq = MAX_CUTOFF * Math.pow(MIN_CUTOFF / MAX_CUTOFF, curved);

        const audioNow = audioCtx.currentTime;
        filterNode.frequency.cancelScheduledValues(audioNow);
        filterNode.frequency.linearRampToValueAtTime(
          targetFreq,
          audioNow + (TONE_RAMP_MS / 1000)
        );

        lastAppliedSliderVal = sliderVal;
        lastToneUpdateTime = nowMs;
      }

      toneRafId = requestAnimationFrame(updateToneIfNeeded);
    }

    function startToneSmoothing() {
      if (toneRafId) cancelAnimationFrame(toneRafId);
      lastToneUpdateTime = performance.now();
      toneRafId = requestAnimationFrame(updateToneIfNeeded);
    }

    function setIcon(playing) {
      btnIcon.innerHTML = playing
        ? '<rect x="6" y="4" width="4" height="15"/><rect x="14" y="4" width="4" height="15"/>'
        : '<polygon points="5,3 19,12 5,21" transform="translate(1,0)"/>';
    }

    playBtn.addEventListener('click', async () => {
      if (!isInitialized) {
        initAudio();
        await audioCtx.resume();
      }

      if (isPlaying) {
        const now = audioCtx.currentTime;
        gainNode.gain.cancelScheduledValues(now);
        gainNode.gain.setValueAtTime(gainNode.gain.value, now);
        gainNode.gain.linearRampToValueAtTime(0, now + FADE_SEC);

        setTimeout(() => {
          if (gainNode) gainNode.gain.value = 0;
          audioEl.pause();
        }, FADE_MS + 20);

        isPlaying = false;
        setIcon(false);
      } else {
        const curved = Math.pow(sliderVal, 1 / EXPO);
        const freq = MAX_CUTOFF * Math.pow(MIN_CUTOFF / MAX_CUTOFF, curved);
        filterNode.frequency.setValueAtTime(freq, audioCtx.currentTime);
        lastAppliedSliderVal = sliderVal;

        gainNode.gain.value = 0;
        await audioCtx.resume();
        audioEl.play().catch(() => {});

        setTimeout(() => {
          if (!gainNode || !audioCtx || !isPlaying) return;
          const now = audioCtx.currentTime;
          gainNode.gain.cancelScheduledValues(now);
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(1, now + FADE_SEC);
        }, PRE_FADE_DELAY_MS);

        isPlaying = true;
        setIcon(true);
        startToneSmoothing();
      }
    });

    // Enable button
    playBtn.disabled = true;
    playBtn.style.opacity = '0.4';
    audioEl.addEventListener('canplaythrough', () => {
      playBtn.disabled = false;
      playBtn.style.opacity = '1';
    }, { once: true });
    audioEl.load();

    // Slider
    function getTrackMetrics() {
      const td = pillThumb.offsetWidth;
      const inset = (pillTrack.clientWidth - td) / 2;
      const travel = pillTrack.clientHeight - inset * 2 - td;
      return { td, inset, travel };
    }

    function updateSliderUI(val) {
      const { td, inset, travel } = getTrackMetrics();
      const thumbTop = inset + val * travel;
      pillThumb.style.top = thumbTop + 'px';
      pillFill.style.height = Math.max(0, pillTrack.clientHeight - (thumbTop + td / 2) - inset) + 'px';
      sliderValue.textContent = Math.round((1 - val) * 100);
    }

    function valFromY(clientY) {
      const { td, inset, travel } = getTrackMetrics();
      const y = (clientY - pillTrack.getBoundingClientRect().top) - inset - td / 2;
      return Math.max(0, Math.min(1, y / travel));
    }

    function onDragStart(e) {
      isDragging = true;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const thumbTop = parseFloat(pillThumb.style.top) || 0;
      const yInPill = clientY - pillTrack.getBoundingClientRect().top;
      dragRelative = yInPill >= thumbTop && yInPill <= thumbTop + pillThumb.offsetWidth;
      dragStartY = clientY;
      dragStartVal = sliderVal;

      if (!dragRelative) {
        sliderVal = valFromY(clientY);
        updateSliderUI(sliderVal);
      }
    }

    function onDragMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      if (dragRelative) {
        const { travel } = getTrackMetrics();
        sliderVal = Math.max(0, Math.min(1, dragStartVal + (clientY - dragStartY) / travel));
      } else {
        sliderVal = valFromY(clientY);
      }
      updateSliderUI(sliderVal);
    }

    function onDragEnd() {
      isDragging = false;
    }

    pillTrack.addEventListener('mousedown', onDragStart);
    pillTrack.addEventListener('touchstart', onDragStart, { passive: true });
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('touchmove', onDragMove, { passive: false });
    window.addEventListener('mouseup', onDragEnd);
    window.addEventListener('touchend', onDragEnd);

    function setUnit() {
      const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty('--unit', (h * 0.86 / 209) + 'px');
      updateSliderUI(sliderVal);
    }
    if (window.visualViewport) window.visualViewport.addEventListener('resize', setUnit);
    window.addEventListener('resize', setUnit);
    setUnit();
    updateSliderUI(0);
  </script>
</body>
</html>
