<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      font-family: system-ui, sans-serif;
      color: #e8f4f8;
    }

    .player-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    .play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: #e8f4f8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .play-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .slider-section {
      display: none;
      align-items: center;
      justify-content: center;
      width: 320px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .slider-section.visible {
      display: flex;
    }

    .slider-section.faded-in {
      opacity: 1;
    }

    input[type=range] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #e8f4f8;
      cursor: pointer;
    }

    input[type=range]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #e8f4f8;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="player-wrap">
    <button class="play-btn" id="playBtn" aria-label="Play ocean audio">
      <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </button>

    <div class="slider-section" id="sliderSection">
      <input type="range" min="0" max="1" step="0.001" value="0" id="filterSlider" aria-label="Filter intensity" />
    </div>
  </div>

  <script>
    const AUDIO_SRC = 'https://raw.githubusercontent.com/phennessey/codepen/main/ocean_light.mp3';

    const MIN_CUTOFF = 200;
    const MAX_CUTOFF = 20000;
    const EXPO = 2;
    const FILTER_Q = 0.1;

    let audioCtx, sourceNode, filterNode, buffer;

    const playBtn = document.getElementById('playBtn');
    const sliderSection = document.getElementById('sliderSection');
    const filterSlider = document.getElementById('filterSlider');

    async function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const res = await fetch(AUDIO_SRC);
      buffer = await audioCtx.decodeAudioData(await res.arrayBuffer());

      filterNode = audioCtx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.Q.value = FILTER_Q;

      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({ title: 'Ocean' });
      }

      startLoop();
    }

    function startLoop() {
      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode.stop();
      }
      sourceNode = audioCtx.createBufferSource();
      sourceNode.buffer = buffer;
      sourceNode.loop = true;
      applyFilter(parseFloat(filterSlider.value));
      sourceNode.start(0);
    }

    function applyFilter(val) {
      if (!sourceNode) return;
      sourceNode.disconnect();

      if (val === 0) {
        sourceNode.connect(audioCtx.destination);
      } else {
        const curved = Math.pow(val, 1 / EXPO);
        const cutoff = MAX_CUTOFF * Math.pow(MIN_CUTOFF / MAX_CUTOFF, curved);
        filterNode.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.05);
        sourceNode.connect(filterNode);
        filterNode.connect(audioCtx.destination);
      }
    }

    playBtn.addEventListener('click', async () => {
      playBtn.style.display = 'none';
      sliderSection.classList.add('visible');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => sliderSection.classList.add('faded-in'));
      });
      await initAudio();
    });

    filterSlider.addEventListener('input', () => {
      applyFilter(parseFloat(filterSlider.value));
    });
  </script>
</body>
</html>
