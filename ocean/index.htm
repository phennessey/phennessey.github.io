<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Ocean Waves</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      font-family: system-ui, sans-serif;
      color: #e8f4f8;
    }

    :root {
      --unit: 0px;
      --pill-w:    calc(43 * var(--unit));
      --pill-h:    calc(160 * var(--unit));
      --btn-sz:    calc(43 * var(--unit));
      --gap:       calc(6 * var(--unit));
      --border:    calc(1.5 * var(--unit));
      --inset:     calc(1.5 * var(--unit));
      --thumb-d:   calc(var(--pill-w) - var(--border) * 2 - var(--inset) * 2);
      --icon-sz:   calc(17 * var(--unit));
      --font-tone: calc(4.5 * var(--unit));
      --font-val:  calc(5.5 * var(--unit));
    }

    .player-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--gap);
    }

    .play-btn {
      width: var(--btn-sz);
      height: var(--btn-sz);
      flex-shrink: 0;
      border-radius: 50%;
      border: var(--border) solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: #e8f4f8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .play-btn:hover { background: rgba(255,255,255,0.12); }

    .slider-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: var(--pill-w);
    }

    .pill-track {
      position: relative;
      width: var(--pill-w);
      height: var(--pill-h);
      border-radius: 999px;
      border: var(--border) solid rgba(255,255,255,0.25);
      background: transparent;
      overflow: hidden;
      cursor: pointer;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    .pill-fill {
      position: absolute;
      bottom: var(--inset);
      left: var(--inset);
      right: var(--inset);
      border-radius: 0 0 999px 999px;
      background: rgba(255,255,255,0.09);
      pointer-events: none;
    }

    .pill-thumb {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: var(--thumb-d);
      height: var(--thumb-d);
      border-radius: 50%;
      background: #667887;
      cursor: pointer;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--unit);
    }

    .slider-label {
      font-size: var(--font-tone);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(13,27,42,0.3);
      line-height: 1;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }

    .slider-value {
      font-size: var(--font-val);
      font-weight: 700;
      letter-spacing: 0;
      color: rgba(13,27,42,0.6);
      line-height: 1;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>
  <audio id="audioEl" src="ocean.mp3" loop preload="auto"></audio>

  <div class="player-wrap">
    <button class="play-btn" id="playBtn" aria-label="Play ocean audio">
      <svg id="btnIcon" viewBox="0 0 24 24" fill="currentColor"
           style="width:var(--icon-sz);height:var(--icon-sz)">
        <polygon points="5,3 19,12 5,21" transform="translate(1,0)"/>
      </svg>
    </button>

    <div class="slider-wrap">
      <div class="pill-track" id="pillTrack">
        <div class="pill-fill" id="pillFill"></div>
        <div class="pill-thumb" id="pillThumb">
          <span class="slider-label">TONE</span>
          <span class="slider-value" id="sliderValue">100</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const MIN_CUTOFF  = 200;
    const MAX_CUTOFF  = 20000;
    const EXPO        = 2;
    const FILTER_Q    = 0.1;
    const FADE_TC     = 0.015; // gain fade time constant in seconds

    let audioCtx, sourceNode, filterNode, gainNode;
    let isPlaying    = false;
    let isInitialized = false;
    let sliderVal    = 0;
    let isDragging   = false;
    let dragRelative = false;
    let dragStartY   = 0;
    let dragStartVal = 0;

    const playBtn     = document.getElementById('playBtn');
    const btnIcon     = document.getElementById('btnIcon');
    const audioEl     = document.getElementById('audioEl');
    const pillTrack   = document.getElementById('pillTrack');
    const pillFill    = document.getElementById('pillFill');
    const pillThumb   = document.getElementById('pillThumb');
    const sliderValue = document.getElementById('sliderValue');

    function setIcon(playing) {
      btnIcon.innerHTML = playing
        ? '<rect x="6" y="4" width="4" height="15"/><rect x="14" y="4" width="4" height="15"/>'
        : '<polygon points="5,3 19,12 5,21" transform="translate(1,0)"/>';
      playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
    }

    function initAudio() {
      audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      sourceNode = audioCtx.createMediaElementSource(audioEl);
      filterNode = audioCtx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.Q.value = FILTER_Q;
      filterNode.frequency.value = MAX_CUTOFF;
      gainNode   = audioCtx.createGain();
      gainNode.gain.value = 1;
      sourceNode.connect(filterNode);
      filterNode.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      applyFilter(sliderVal, true);
      if ('mediaSession' in navigator)
        navigator.mediaSession.metadata = new MediaMetadata({ title: 'Ocean Waves' });
      isInitialized = true;
    }

    function applyFilter(val, instant) {
      if (!filterNode) return;
      const curved = Math.pow(val, 1 / EXPO);
      const cutoff = MAX_CUTOFF * Math.pow(MIN_CUTOFF / MAX_CUTOFF, curved);
      if (instant || !isPlaying) {
        filterNode.frequency.value = cutoff;
      } else {
        filterNode.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.05);
      }
    }

    playBtn.addEventListener('click', async () => {
      if (!isInitialized) {
        initAudio();
        await audioCtx.resume();
      }

      if (isPlaying) {
        const now = audioCtx.currentTime;
        gainNode.gain.cancelScheduledValues(now);
        gainNode.gain.setValueAtTime(1, now);
        gainNode.gain.setTargetAtTime(0, now, FADE_TC);
        setTimeout(() => {
          gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
          gainNode.gain.value = 0;
          audioEl.pause();
        }, FADE_TC * 1000 * 6);
        isPlaying = false;
        setIcon(false);
      } else {
        applyFilter(sliderVal, true);
        await audioCtx.resume();
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.setTargetAtTime(1, audioCtx.currentTime, FADE_TC);
        audioEl.play();
        isPlaying = true;
        setIcon(true);
      }
    });

    function thumbD() { return pillThumb.offsetWidth; }

    function updateSliderUI(val) {
      const trackH = pillTrack.clientHeight;
      const td = thumbD();
      const inset = (pillTrack.clientWidth - td) / 2;
      const travel = trackH - inset * 2 - td;
      const thumbTop = inset + val * travel;
      pillThumb.style.top = thumbTop + 'px';
      const fillHeight = trackH - (thumbTop + td / 2) - inset;
      pillFill.style.height = Math.max(0, fillHeight) + 'px';
      sliderValue.textContent = Math.round((1 - val) * 100);
    }

    function valFromY(clientY) {
      const rect = pillTrack.getBoundingClientRect();
      const td = thumbD();
      const inset = (pillTrack.clientWidth - td) / 2;
      const travel = pillTrack.clientHeight - inset * 2 - td;
      const y = (clientY - rect.top) - inset - td / 2;
      return Math.max(0, Math.min(1, y / travel));
    }

    function onDragStart(e) {
      isDragging = true;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const rect = pillTrack.getBoundingClientRect();
      const td = thumbD();
      const thumbTop = parseFloat(pillThumb.style.top) || 0;
      const yInPill = clientY - rect.top;

      if (yInPill >= thumbTop && yInPill <= thumbTop + td) {
        dragRelative = true;
        dragStartY = clientY;
        dragStartVal = sliderVal;
      } else {
        dragRelative = false;
        sliderVal = valFromY(clientY);
        dragStartY = clientY;
        dragStartVal = sliderVal;
        updateSliderUI(sliderVal);
        applyFilter(sliderVal);
      }
    }

    function onDragMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      if (dragRelative) {
        const td = thumbD();
        const inset = (pillTrack.clientWidth - td) / 2;
        const travel = pillTrack.clientHeight - inset * 2 - td;
        const delta = (clientY - dragStartY) / travel;
        sliderVal = Math.max(0, Math.min(1, dragStartVal + delta));
      } else {
        sliderVal = valFromY(clientY);
      }
      updateSliderUI(sliderVal);
      applyFilter(sliderVal);
    }

    function onDragEnd() { isDragging = false; }

    pillTrack.addEventListener('mousedown', onDragStart);
    pillTrack.addEventListener('touchstart', onDragStart, { passive: true });
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('touchmove', onDragMove, { passive: false });
    window.addEventListener('mouseup', onDragEnd);
    window.addEventListener('touchend', onDragEnd);

    const BASE_H = 209;

    function setUnit() {
      const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const unit = (h * 0.86) / BASE_H;
      document.documentElement.style.setProperty('--unit', unit + 'px');
      updateSliderUI(sliderVal);
    }

    if (window.visualViewport) window.visualViewport.addEventListener('resize', setUnit);
    window.addEventListener('resize', setUnit);
    setUnit();
    updateSliderUI(0);
  </script>
</body>
</html>
