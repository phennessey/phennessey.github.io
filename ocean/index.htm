<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Ocean</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      font-family: system-ui, sans-serif;
      color: #e8f4f8;
    }

    .player-wrap {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .play-btn {
      width: 43px;
      height: 43px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: #e8f4f8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .play-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .slider-wrap {
      position: relative;
      width: 260px;
      height: 43px;
      display: flex;
      align-items: center;
    }

    .slider-label {
      position: absolute;
      top: 0px;
      left: 0;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(232,244,248,0.45);
      line-height: 1;
    }

    input[type=range] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
      display: block;
      margin: 0;
      padding: 0;
    }

    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: #e8f4f8;
      cursor: pointer;
      margin-top: -6px;
    }

    input[type=range]::-moz-range-track {
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }

    input[type=range]::-moz-range-thumb {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: #e8f4f8;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <audio id="audioEl" src="ocean.mp3" loop preload="auto"></audio>

  <div class="player-wrap">
    <button class="play-btn" id="playBtn" aria-label="Play ocean audio">
      <svg id="btnIcon" viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
        <polygon points="5,3 19,12 5,21" transform="translate(1,0)"/>
      </svg>
    </button>

    <div class="slider-wrap">
      <span class="slider-label">TONE</span>
      <input type="range" min="0" max="1" step="0.001" value="0" id="filterSlider" aria-label="Filter intensity" />
    </div>
  </div>

  <script>
    const MIN_CUTOFF = 200;
    const MAX_CUTOFF = 20000;
    const EXPO = 2;
    const FILTER_Q = 0.1;

    let audioCtx, sourceNode, filterNode;
    let isPlaying = false;
    let isInitialized = false;

    const playBtn = document.getElementById('playBtn');
    const btnIcon = document.getElementById('btnIcon');
    const filterSlider = document.getElementById('filterSlider');
    const audioEl = document.getElementById('audioEl');

    function setIcon(playing) {
      btnIcon.innerHTML = playing
        ? '<rect x="6" y="4" width="4" height="15"/><rect x="14" y="4" width="4" height="15"/>'
        : '<polygon points="5,3 19,12 5,21" transform="translate(1,0)"/>';
      playBtn.setAttribute('aria-label', playing ? 'Pause ocean audio' : 'Play ocean audio');
    }

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      sourceNode = audioCtx.createMediaElementSource(audioEl);
      filterNode = audioCtx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.Q.value = FILTER_Q;
      sourceNode.connect(audioCtx.destination);
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({ title: 'Ocean' });
      }
      isInitialized = true;
    }

    function applyFilter(val) {
      if (!sourceNode) return;
      sourceNode.disconnect();
      if (val === 0) {
        sourceNode.connect(audioCtx.destination);
      } else {
        const curved = Math.pow(val, 1 / EXPO);
        const cutoff = MAX_CUTOFF * Math.pow(MIN_CUTOFF / MAX_CUTOFF, curved);
        filterNode.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.05);
        sourceNode.connect(filterNode);
        filterNode.connect(audioCtx.destination);
      }
    }

    playBtn.addEventListener('click', () => {
      if (!isInitialized) {
        initAudio();
      }
      audioCtx.resume();
      if (isPlaying) {
        audioEl.pause();
        isPlaying = false;
        setIcon(false);
      } else {
        audioEl.play();
        isPlaying = true;
        setIcon(true);
      }
    });

    filterSlider.addEventListener('input', () => {
      applyFilter(parseFloat(filterSlider.value));
    });
  </script>
</body>
</html>
