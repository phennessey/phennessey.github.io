<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OKHSL Color Picker</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="top-ui">

    <div class="picker-wrap color-map-panel">
      <div class="colormap-body">
        <div class="panel">
          <canvas id="wheel"></canvas>
          <svg class="overlay" id="disc-overlay"></svg>
          <div class="disc-border-overlay"></div>
        </div>
        <div class="panel">
          <div id="lightbar"></div>
          <svg class="overlay" id="lightbar-overlay"></svg>
        </div>
      </div>
    </div>

    <div class="ui-section section-setup">
      <div class="section-label">Setup</div>
      <div class="section-body hex-panel">
        <textarea class="hex-input" spellcheck="false" autocomplete="off"></textarea>
        <button id="add-color-btn" type="button" aria-label="Add color">+</button>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="ui-section section-pantone">
      <div class="section-label">Pantone</div>
      <div class="section-body library-panel" id="library-panel">
        <label><input type="checkbox" data-library="base"> Display Pantones</label>
        <div class="libraries">
          <label><input type="checkbox" data-library="pastel"> Pastel</label>
          <label><input type="checkbox" data-library="neon"> Neon</label>
          <label><input type="checkbox" data-library="sp"> Skin tones</label>
          <label><input type="checkbox" data-library="xgc"> Extended gamut</label>
          <label><input type="checkbox" data-library="metallic"> Metallic</label>
        </div>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="ui-section section-cmyk">
      <div class="section-label">CMYK</div>
      <div class="section-body cmyk-body"></div>
    </div>

    <div class="section-divider"></div>

    <div class="ui-section section-export">
      <div class="section-label">Export</div>
      <div class="section-body export-body"></div>
    </div>
  </div>
  <div class="swatches"></div>
  <div class="status-region" id="status-region"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
