<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OKHSL Color Picker</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="top-ui">

    <div class="picker-wrap color-map-panel">
      <div class="colormap-body">
        <div class="panel">
          <canvas id="wheel"></canvas>
          <svg class="overlay" id="disc-overlay"></svg>
          <div class="disc-border-overlay"></div>
        </div>
        <div class="panel">
          <div id="lightbar"></div>
          <svg class="overlay" id="lightbar-overlay"></svg>
        </div>
      </div>
    </div>

    <div class="ui-section section-setup">
      <div class="section-head">
        <div class="section-label">Setup</div>
      </div>
      <div class="section-body hex-panel">
        <textarea class="hex-input" spellcheck="false" autocomplete="off"></textarea>
        <button id="add-color-btn" type="button" aria-label="Add color">+</button>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="ui-section section-pantone collapsible">
      <div class="section-head">
        <span class="section-toggle-box">
          <input type="checkbox" class="section-toggle" id="toggle-pantone" data-library="base">
          <span class="section-tri" aria-hidden="true"></span>
        </span>
        <label class="section-label" for="toggle-pantone">Pantone</label>
      </div>
      <div class="section-vlabel">Pantone</div>
      <div class="section-body library-panel" id="library-panel">
        <div class="libraries-label">Additional libraries</div>
        <div class="libraries">
          <label><input type="checkbox" data-library="pastel"> Pastel</label>
          <label><input type="checkbox" data-library="neon"> Neon</label>
          <label><input type="checkbox" data-library="sp"> Skin tones</label>
          <label><input type="checkbox" data-library="xgc"> Extended gamut</label>
          <label><input type="checkbox" data-library="metallic"> Metallic</label>
        </div>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="ui-section section-cmyk collapsible">
      <div class="section-head">
        <span class="section-toggle-box">
          <input type="checkbox" class="section-toggle" id="toggle-cmyk">
          <span class="section-tri" aria-hidden="true"></span>
        </span>
        <label class="section-label" for="toggle-cmyk">CMYK</label>
      </div>
      <div class="section-vlabel">CMYK</div>
      <div class="section-body cmyk-body">
        <div class="cmyk-profile-row">
          <label class="cmyk-profile-label" for="cmyk-profile">ICC profile</label>
          <div class="cmyk-profile-select-wrap">
            <select class="cmyk-profile-select" id="cmyk-profile">
              <option value="gracol">GRACoL 2006</option>
              <option value="swop">U.S. SWOP v2</option>
              <option value="fogra39">FOGRA39</option>
            </select>
          </div>
        </div>
        <div class="cmyk-bias">
          <div class="cmyk-bias-track">
            <input type="range" class="cmyk-bias-slider" id="cmyk-bias"
                   min="0" max="100" value="0" step="1"
                   aria-label="Out-of-gamut bias: standard to closer lightness">
          </div>
          <div class="cmyk-bias-labels">
            <span>Standard</span>
            <span>Closer lightness</span>
          </div>
        </div>
        <label class="cmyk-check">
          <input type="checkbox" id="cmyk-show-boundary">
          <span>Show CMYK gamut boundary</span>
        </label>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="ui-section section-export collapsible">
      <div class="section-head">
        <span class="section-toggle-box">
          <input type="checkbox" class="section-toggle" id="toggle-export">
          <span class="section-tri" aria-hidden="true"></span>
        </span>
        <label class="section-label" for="toggle-export">Export</label>
      </div>
      <div class="section-vlabel">Export</div>
      <div class="section-body export-body"></div>
    </div>
  </div>
  <div class="swatches"></div>
  <div class="status-region" id="status-region"></div>

  <!-- Vendored Little-CMS-class ICC engine (UMD global `jsColorEngine`), loaded
       before the module so the CMYK feature can use it synchronously. -->
  <script src="./lib/jsColorEngineWeb.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
